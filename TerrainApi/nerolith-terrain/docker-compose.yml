services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
      - postgres
    volumes:
      - .:/app
      - E:/nerolith_outputs:/mnt/nerolith_outputs

  worker:
    build: .
    command: celery -A workers.celery_app worker --loglevel=info -Q priority_high,priority_normal,priority_low,callbacks
    env_file: .env
    depends_on:
      - redis
      - postgres
    volumes:
      - .:/app
      - E:/nerolith_outputs:/mnt/nerolith_outputs

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nerolith_terrain
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  flower:
    build: .
    command: celery -A workers.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file: .env
    depends_on:
      - redis

  mcp:
    build: .
    command: python -m terrain_mcp
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - FASTMCP_PORT=8001
      - FASTMCP_HOST=0.0.0.0
    depends_on:
      - api
      - redis
    volumes:
      - .:/app
      - E:/nerolith_outputs:/mnt/nerolith_outputs

volumes:
  redis_data:
  postgres_data: