<svg width="512" height="512" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#000000"/>

  <!-- Lines -->
  <g stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- Outer cube -->
    <polygon points="60,50 140,50 160,100 100,160 40,100"/>
    
    <!-- Inner structure -->
    <line x1="60" y1="50" x2="100" y2="100"/>
    <line x1="140" y1="50" x2="100" y2="100"/>
    <line x1="40" y1="100" x2="100" y2="100"/>
    <line x1="160" y1="100" x2="100" y2="100"/>
    <line x1="100" y1="160" x2="100" y2="100"/>

    <!-- Top inner -->
    <line x1="60" y1="50" x2="100" y2="50"/>
    <line x1="140" y1="50" x2="100" y2="50"/>

  </g>

  <!-- Nodes -->
  <g fill="#ffffff">
    <circle cx="60" cy="50" r="3"/>
    <circle cx="140" cy="50" r="3"/>
    <circle cx="160" cy="100" r="3"/>
    <circle cx="100" cy="160" r="3"/>
    <circle cx="40" cy="100" r="3"/>
    <circle cx="100" cy="100" r="3"/>
    <circle cx="100" cy="50" r="3"/>
  </g>
</svg>